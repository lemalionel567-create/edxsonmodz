<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDXSON MODZ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:black;
    color:white;
    overflow:hidden;
}

/* PARTICULAS */

#particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:0;
    overflow:hidden;
}

.particle{
    position:absolute;
    border-radius:50%;
    opacity:0.8;
    animation:float linear infinite;
}

@keyframes float{

from{
transform:translateY(100vh) scale(0);
}

to{
transform:translateY(-10vh) scale(1);
}

}

/* LOADER */

#loader{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.logo{
    font-size:40px;
    color:#bb00ff;
    text-shadow:
    0 0 10px #bb00ff,
    0 0 20px #bb00ff,
    0 0 40px white;
    margin-bottom:30px;
}

.loading-bar{
    width:300px;
    height:20px;
    background:#111;
    border-radius:20px;
    overflow:hidden;
    border:2px solid #bb00ff;
}

.loading{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#bb00ff,#ffffff);
    animation:load 4s forwards;
}

@keyframes load{

0%{
width:0%;
}

100%{
width:100%;
}

}

/* CONTENIDO */

#content{
    display:none;
    position:relative;
    width:100%;
    height:100vh;
    overflow:auto;
    z-index:2;
}

/* INICIO */

.main{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:90%;
}

.main h1{
    font-size:60px;
    color:#bb00ff;
    text-shadow:
    0 0 10px #bb00ff,
    0 0 20px #bb00ff,
    0 0 40px white;
}

.main p{
    margin-top:20px;
    font-size:22px;
    line-height:35px;
}

/* BOTONES */

.btn{
    margin-top:25px;
    display:inline-block;
    padding:12px 30px;
    background:#bb00ff;
    color:white;
    text-decoration:none;
    border-radius:15px;
    box-shadow:0 0 20px #bb00ff;
    transition:0.3s;
    cursor:pointer;
    border:none;
}

.btn:hover{
    transform:scale(1.08);
    background:white;
    color:black;
}

/* COPYRIGHT */

.copy{
    position:fixed;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:14px;
    color:#aaa;
    z-index:5;
}

/* DESCARGAS */

#downloads{
    display:none;
    padding:30px;
    text-align:center;
}

.download-title{
    margin-top:30px;
    font-size:45px;
    color:#bb00ff;
    text-shadow:0 0 20px #bb00ff;
}

/* CARD */

.card{
    margin:40px auto;
    width:260px;
    background:#111;
    border-radius:20px;
    padding:15px;
    border:2px solid #bb00ff;
    box-shadow:0 0 20px #bb00ff;
}

.file-title{
    margin-bottom:12px;
    font-size:20px;
    text-align:center;
    color:white;
}

.file-img{
    width:100%;
    height:140px;
    border-radius:12px;
    object-fit:cover;
    background:#222;
}

.date{
    margin-top:10px;
    color:#bbb;
}

/* PASOS */

#steps{
    display:none;
    width:100%;
    height:100vh;
    text-align:center;
    position:relative;
}

.steps-title{
    margin-top:40px;
    font-size:45px;
    color:#bb00ff;
    text-shadow:0 0 20px #bb00ff;
}

.steps-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
}

.step-btn{
    display:block;
    margin:20px auto;
    width:260px;
    padding:15px;
    background:#bb00ff;
    color:white;
    border-radius:15px;
    text-decoration:none;
    box-shadow:0 0 20px #bb00ff;
}

#direct{
    opacity:0.5;
    pointer-events:none;
}

.bottom{
    position:absolute;
    bottom:40px;
    width:100%;
    font-size:24px;
    color:white;
}

</style>
</head>

<body>

<div id="particles"></div>

<div id="loader">

<div class="logo">
EDXSON MODZ
</div>

<div class="loading-bar">
<div class="loading"></div>
</div>

</div>

<div id="content">

<div class="main" id="home">

<h1>EDXSON MODZ</h1>

<p>
BIENVENIDO TE SALUDA EDXSON MODZ <br>
A LA MEJOR PÁGINA DE ARCHIVOS
</p>

<button class="btn" onclick="openDownloads()">
INICIAR DESCARGAS
</button>

</div>

<div id="downloads">

<h1 class="download-title">
ARCHIVOS GRATIS
</h1>

<div class="card">

<div class="file-title">
FREE FIRE MOD MENU
</div>

<img class="file-img"
src="https://i.imgur.com/2DhmtJ4.jpeg">

<div class="date">
FECHA: 09/05/2026
</div>

<button class="btn"
onclick="openSteps()">
DESCARGAR
</button>

</div>

</div>

<div id="steps">

<h1 class="steps-title">
CUMPLE CON LOS PASOS
</h1>

<div class="steps-box">

<a class="step-btn"
href="https://youtube.com"
target="_blank"
onclick="completeStep()">
CANAL DE YT
</a>

<a class="step-btn"
href="https://youtube.com"
target="_blank"
onclick="completeStep()">
LIKE VIDEO YT
</a>

<a class="step-btn"
href="https://whatsapp.com/channel/"
target="_blank"
onclick="completeStep()">
CANAL DE WHATSAPP
</a>

<a class="step-btn"
id="direct"
href="#">
DESCARGA DIRECTA
</a>

</div>

<div class="bottom">
DISFRUTA EL ARCHIVO
</div>

</div>

<div class="copy">
© 2026 EDXSON MODZ - TODOS LOS DERECHOS RESERVADOS
</div>

</div>

<script>

(function(){

setTimeout(()=>{

document.getElementById("loader").style.display="none";
document.getElementById("content").style.display="block";

},4000);

const particles=document.getElementById("particles");

for(let i=0;i<120;i++){

let particle=document.createElement("div");

particle.classList.add("particle");

let size=Math.random()*8+2;

particle.style.width=size+"px";
particle.style.height=size+"px";

particle.style.left=Math.random()*100+"%";

let colors=["#bb00ff","#ffffff","#7700ff"];

particle.style.background=
colors[Math.floor(Math.random()*colors.length)];

particle.style.animationDuration=
(Math.random()*10+5)+"s";

particle.style.animationDelay=
(Math.random()*5)+"s";

particles.appendChild(particle);

}

window.openDownloads=function(){

document.getElementById("home").style.display="none";

document.getElementById("downloads").style.display="block";

}

window.openSteps=function(){

document.getElementById("downloads").style.display="none";

document.getElementById("steps").style.display="block";

}

let count=0;

window.completeStep=function(){

count++;

if(count>=3){

let btn=document.getElementById("direct");

btn.style.opacity="1";
btn.style.pointerEvents="auto";
btn.href="TU-LINK-DIRECTO";

}

}

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="I"){
e.preventDefault();
}

if(e.ctrlKey && e.shiftKey && e.key==="J"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="u"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="s"){
e.preventDefault();
}

});

setInterval(function(){

const abierto =
window.outerWidth-window.innerWidth>160 ||
window.outerHeight-window.innerHeight>160;

if(abierto){

document.body.innerHTML=`

<div style="
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:#bb00ff;
font-family:Arial;
text-align:center;
">

<h1 style="
font-size:50px;
text-shadow:0 0 20px #bb00ff;
">
⚠️ EDXSON MODZ ⚠️
</h1>

<p style="
font-size:25px;
margin-top:20px;
">
ACCESO BLOQUEADO
</p>

</div>

`;

}

},1000);

})();

</script>

</body>
</html>
